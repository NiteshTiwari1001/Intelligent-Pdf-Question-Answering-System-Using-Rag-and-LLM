services:
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=smart-research

  server:
    build: ./server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/smart-research
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - valkey
      - qdrant
    volumes:
      - uploads-data:/app/uploads

  worker:
    build: ./server
    command: node worker.js
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/smart-research
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - valkey
      - qdrant
    volumes:
      - uploads-data:/app/uploads

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongodb-data:
  qdrant-data:
  uploads-data:
